name: Conformance

on:
  workflow_dispatch:
    inputs:
      strict_mode:
        description: 'Fail on any normalization differences'
        type: boolean
        default: false
      verbose:
        description: 'Enable verbose output'
        type: boolean
        default: false
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  conformance:
    name: br↔bd Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5
        with:
          go-version: '1.23'
          cache: false

      - name: Build br
        run: cargo build --release

      - name: Clone and build bd (Go beads)
        id: build_bd
        continue-on-error: true
        run: |
          git clone --depth 1 https://github.com/Dicklesworthstone/beads.git ../beads-go
          cd ../beads-go
          go build -o bd ./cmd/beads
          echo "BD_BINARY=$(pwd)/bd" >> "$GITHUB_ENV"

      - name: Verify binaries
        if: steps.build_bd.outcome == 'success'
        run: |
          echo "=== br version ==="
          ./target/release/br --version
          echo ""
          echo "=== bd version ==="
          $BD_BINARY version || true

      - name: Run conformance tests
        if: steps.build_bd.outcome == 'success'
        run: |
          ARGS=()
          if [ "${{ inputs.verbose }}" = "true" ]; then
            ARGS+=(--verbose)
          fi
          scripts/conformance.sh "${ARGS[@]}"
        env:
          BD_BINARY: ${{ env.BD_BINARY }}
          CONFORMANCE_STRICT: ${{ inputs.strict_mode && '1' || '0' }}
          CONFORMANCE_TIMEOUT: 180
          NO_COLOR: 1

      - name: Upload conformance summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: conformance-summary
          path: target/test-artifacts/conformance_summary.json
          if-no-files-found: ignore

      - name: Upload conformance artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: conformance-artifacts
          path: target/test-artifacts/conformance/
          if-no-files-found: ignore

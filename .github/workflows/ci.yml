name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features

      - name: Clippy (no default features)
        run: cargo clippy --all-targets --no-default-features

      - name: Check (all targets)
        run: cargo check --all-targets --all-features

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install cargo-audit
        uses: taiki-e/install-action@711e1c3275189d76dcc4d34ddea63bf96ac49090  # v2.76.0
        with:
          tool: cargo-audit

      - name: Security audit
        run: cargo audit --deny warnings
        continue-on-error: true  # Advisory-only for now

      - name: Check for yanked dependencies
        run: cargo audit --deny yanked

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Run all tests (all features)
        run: cargo test --all-features -- --nocapture
        env:
          RUST_LOG: beads_rust=debug

      - name: Run tests (no default features)
        run: cargo test --no-default-features

      - name: Run doc tests
        run: cargo test --doc

  reliability-gates:
    name: Reliability Gates
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Failure-corpus replay and doctor/recovery postconditions
        run: cargo test --test workspace_failure_replay -- --nocapture
        env:
          RUST_LOG: beads_rust=debug

      - name: Crash-injection sync matrix
        run: cargo test --test e2e_sync_failure_injection -- --nocapture
        env:
          HARNESS_ARTIFACTS: 1
          NO_COLOR: 1

      - name: Long-lived single-workspace stress
        run: cargo test --test e2e_workspace_scenarios scenario_long_lived_single_workspace_stress_suite -- --nocapture
        env:
          BR_LONG_STRESS_ITERATIONS: 8
          HARNESS_ARTIFACTS: 1
          NO_COLOR: 1

      - name: Concurrent command-family integrity stress
        run: cargo test --test e2e_concurrency e2e_interleaved_command_families_preserve_workspace_integrity -- --nocapture
        env:
          HARNESS_ARTIFACTS: 1
          NO_COLOR: 1

      - name: Upload reliability artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: reliability-gate-artifacts
          path: target/test-artifacts/
          if-no-files-found: ignore

  audit-gates:
    name: Audit Guardrails (2026-05-09)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check
    # Gates added by beads_rust-6jmq for the audit-driven cleanup EPIC
    # (beads_rust-ebzi). Each step corresponds to a sibling bead's harness:
    #   - Snapshot freshness    (l6xl)
    #   - ID-pinning lint       (s5se) — runs as part of `cargo test`
    #   - Forced-cycle-close audit (30ci)
    #   - Sync-safety witness   (yyxo) — Linux only
    #   - Concurrency witness   (mjmk)
    # Documented in docs/TESTING_GUIDELINES.md and the per-bead specs.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Install cargo-insta
        run: cargo install cargo-insta --locked --version 1.46.1

      - name: Build release br binary (used by shell harnesses)
        run: cargo build --release

      # l6xl: snapshot freshness — fails CI on any *.snap.new alongside *.snap
      - name: Snapshot freshness gate (beads_rust-l6xl)
        run: cargo insta test --check --workspace
        env:
          RUST_LOG: error

      # 30ci: regression check that no closed bead has audit-suspect close_reason
      # without an audit-historical-cycle-close-* escape-hatch label
      - name: Audit suspect close_reasons gate (beads_rust-30ci)
        run: bash tests/e2e_scripts/forced_cycle_close_audit.sh

      # yyxo: filesystem-witness regression for sync allowlist (PC-1 / PC-RECOVERY)
      - name: Sync safety witness (beads_rust-yyxo)
        run: |
          export BR_BIN="$(pwd)/target/release/br"
          bash tests/e2e_scripts/sync_safety_witness.sh

      # mjmk: 50-iter concurrency no-flake harness — readers race writer.
      # Smoke-run 5 iters in CI to keep wall time bounded; full 50-iter
      # is a local pre-merge check.
      - name: Concurrency witness 5-iter smoke (beads_rust-mjmk)
        run: |
          export BR_BIN="$(pwd)/target/release/br"
          ITER_OVERRIDE=5 bash tests/e2e_scripts/concurrency_witness_logged.sh

      - name: Upload audit-gate event logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: audit-gate-event-logs
          path: |
            /tmp/sync_safety_witness_*.jsonl
            /tmp/concurrency_witness_*.jsonl
            /tmp/forced_cycle_close_audit_*.summary.txt
          if-no-files-found: ignore

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@711e1c3275189d76dcc4d34ddea63bf96ac49090  # v2.76.0
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 (glibc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          # Linux ARM64 (native runner - 10x faster than QEMU)
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
          # macOS Apple Silicon (native)
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-arm64
          # macOS Intel
          - os: macos-15-intel
            target: x86_64-apple-darwin
            name: macos-x64
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
        with:
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary runs (Unix)
        if: runner.os != 'Windows'
        run: ./target/${{ matrix.target }}/release/br --version

      - name: Verify binary runs (Windows)
        if: runner.os == 'Windows'
        run: ./target/${{ matrix.target }}/release/br.exe --version

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: br-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/br

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: br-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/br.exe

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Restore criterion baseline cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: target/criterion/
          key: ${{ runner.os }}-${{ runner.arch }}-criterion-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-criterion-

      - name: Snapshot benchmark baseline (if present)
        run: |
          if [ -d target/criterion ]; then
            mkdir -p target/criterion_prev
            cp -a target/criterion/. target/criterion_prev/
          fi

      - name: Run benchmarks
        run: |
          set -euo pipefail
          if find target/criterion -path "*/main/estimates.json" -type f 2>/dev/null | grep -q .; then
            cargo bench --bench storage_perf -- --baseline main --save-baseline main
          else
            cargo bench --bench storage_perf -- --save-baseline main
          fi
        continue-on-error: true

      - name: Check benchmark regressions (10% threshold)
        run: |
          python3 - <<'PY'
          import glob
          import json
          import os
          import sys

          threshold = 1.10
          prev_root = "target/criterion_prev"
          curr_root = "target/criterion"

          if not os.path.isdir(prev_root):
              print("benchmark_regression: no previous baseline; skipping")
              sys.exit(0)

          prev_files = glob.glob(os.path.join(prev_root, "**", "main", "estimates.json"), recursive=True)
          if not prev_files:
              print("benchmark_regression: no baseline estimates; skipping")
              sys.exit(0)

          regressions = []
          for prev_path in prev_files:
              rel = os.path.relpath(prev_path, prev_root)
              curr_path = os.path.join(curr_root, rel)
              if not os.path.exists(curr_path):
                  continue
              with open(prev_path, "r", encoding="utf-8") as fh:
                  prev = json.load(fh)
              with open(curr_path, "r", encoding="utf-8") as fh:
                  curr = json.load(fh)
              prev_mean = prev.get("mean", {}).get("point_estimate", 0.0)
              curr_mean = curr.get("mean", {}).get("point_estimate", 0.0)
              if prev_mean <= 0:
                  continue
              ratio = curr_mean / prev_mean
              if ratio > threshold:
                  regressions.append((rel, prev_mean, curr_mean, ratio))

          if regressions:
              print("benchmark_regression: failures (mean > 10% slower)")
              for rel, prev_mean, curr_mean, ratio in regressions:
                  print(f"  {rel}: prev={prev_mean:.2f} curr={curr_mean:.2f} ratio={ratio:.2f}")
              sys.exit(1)

          print("benchmark_regression: ok")
          PY

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: benchmark-results
          path: target/criterion/
          if-no-files-found: ignore

      - name: Save criterion baseline cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: target/criterion/
          key: ${{ runner.os }}-${{ runner.arch }}-criterion-${{ github.run_id }}

  # Verify version auditing info is correctly embedded
  version-audit:
    name: Version Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download Linux artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: br-linux-x64
          path: ./bin

      - name: Make binary executable
        run: chmod +x ./bin/br

      - name: Verify version info
        run: |
          echo "=== Version output ==="
          ./bin/br --version
          echo ""
          echo "=== Checking for build info ==="
          VERSION_OUTPUT=$(./bin/br --version 2>&1 || true)
          if echo "$VERSION_OUTPUT" | grep -q "br\|beads"; then
            echo "Version info present"
          else
            echo "Warning: Version output may be missing expected info"
          fi

  e2e-quick:
    name: Quick E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Run quick E2E tests
        run: scripts/e2e.sh
        env:
          NO_COLOR: 1
          HARNESS_ARTIFACTS: 1

      - name: Upload E2E summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: e2e-quick-summary
          path: target/test-artifacts/e2e_quick_summary.json
          if-no-files-found: ignore

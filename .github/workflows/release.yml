name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true
        type: string
      skip_reliability_gates:
        description: 'Emergency only: skip reliability gates after recording a reason'
        required: false
        type: boolean
        default: false
      reliability_override_reason:
        description: 'Required when skip_reliability_gates is true'
        required: false
        type: string

# Ensure only one release runs at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

permissions:
  contents: write
  id-token: write      # Required for SLSA provenance
  attestations: write  # Required for artifact attestations

jobs:
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version check passed: $CARGO_VERSION"

  reliability-gates:
    name: Release Reliability Gates
    runs-on: ubuntu-latest
    timeout-minutes: 75
    needs: preflight
    steps:
      - name: Validate reliability override
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_reliability_gates }}
        env:
          RELIABILITY_OVERRIDE_REASON: ${{ inputs.reliability_override_reason }}
        run: |
          set -euo pipefail
          if [ -z "$RELIABILITY_OVERRIDE_REASON" ]; then
            echo "::error::reliability_override_reason is required when skip_reliability_gates is true"
            exit 1
          fi
          {
            echo "## Release Reliability Gates"
            echo ""
            echo "Reliability gates were explicitly skipped for this manual release."
            echo ""
            echo "Reason: $RELIABILITY_OVERRIDE_REASON"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_reliability_gates }}

      - name: Install Rust toolchain
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_reliability_gates }}
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - name: Cache cargo
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_reliability_gates }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1

      - name: Failure-corpus replay and doctor/recovery postconditions
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_reliability_gates }}
        run: cargo test --test workspace_failure_replay -- --nocapture
        env:
          RUST_LOG: beads_rust=debug

      - name: Crash-injection sync matrix
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_reliability_gates }}
        run: cargo test --test e2e_sync_failure_injection -- --nocapture
        env:
          HARNESS_ARTIFACTS: 1
          NO_COLOR: 1

      - name: Long-lived single-workspace stress
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_reliability_gates }}
        run: cargo test --test e2e_workspace_scenarios scenario_long_lived_single_workspace_stress_suite -- --nocapture
        env:
          BR_LONG_STRESS_ITERATIONS: 8
          HARNESS_ARTIFACTS: 1
          NO_COLOR: 1

      - name: Concurrent command-family integrity stress
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_reliability_gates }}
        run: cargo test --test e2e_concurrency e2e_interleaved_command_families_preserve_workspace_integrity -- --nocapture
        env:
          HARNESS_ARTIFACTS: 1
          NO_COLOR: 1

      - name: Record reliability gate outcome
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || !inputs.skip_reliability_gates) }}
        run: |
          {
            echo "## Release Reliability Gates"
            echo ""
            echo "Mandatory release reliability gates ran before artifact build:"
            echo "- failure-corpus replay"
            echo "- crash-injection sync matrix"
            echo "- long-lived single-workspace stress"
            echo "- concurrent command-family integrity stress"
            echo "- doctor/recovery postcondition checks"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reliability artifacts
        if: ${{ always() && env.ACT != 'true' && (github.event_name != 'workflow_dispatch' || !inputs.skip_reliability_gates) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-reliability-gate-artifacts
          path: target/test-artifacts/
          if-no-files-found: ignore

  build-release:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    needs: reliability-gates
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 (gnu)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            name: linux_amd64
            can_run: true
            linker: ""
          # Linux x64 (musl) — statically linked, no glibc dependency
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            name: linux_musl_amd64
            can_run: true
            linker: ""
          # Linux ARM64 (gnu)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            name: linux_arm64
            can_run: false
            linker: aarch64-linux-gnu-gcc
          # Linux ARM64 (musl) — statically linked, no glibc dependency
          # (Alpine Linux on aarch64 needs this; #284)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            archive: tar.gz
            name: linux_musl_arm64
            can_run: true
            linker: ""
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-15
            archive: tar.gz
            name: darwin_amd64
            can_run: true
            linker: ""
          # macOS Apple Silicon (native)
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            name: darwin_arm64
            can_run: true
            linker: ""
          # Windows x64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            archive: zip
            name: windows_amd64
            can_run: false
            linker: x86_64-w64-mingw32-gcc

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # Full history for vergen

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Install musl-tools (for musl targets)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross toolchains
        if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          elif [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            sudo apt-get install -y mingw-w64 zip
          fi

      - name: Fix MinGW import library case
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          libkernel32="$(x86_64-w64-mingw32-gcc -print-file-name=libkernel32.a)"
          libdir="$(dirname "$libkernel32")"
          if [ "$libkernel32" = "libkernel32.a" ] || [ ! -f "$libkernel32" ]; then
            echo "Could not locate libkernel32.a"
            exit 1
          fi
          sudo ln -sf "$libkernel32" "$libdir/libKernel32.a"

      - name: Configure cross linker
        if: matrix.linker != ''
        run: |
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"
              ;;
            x86_64-pc-windows-gnu)
              echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
        with:
          key: release-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --features self_update
        env:
          VERGEN_GIT_SHA: ${{ github.sha }}
          VERGEN_GIT_BRANCH: ${{ github.ref_name }}

      - name: Verify binary version matches tag
        if: matrix.can_run
        run: |
          EXPECTED="${{ github.ref_name }}"
          EXPECTED="${EXPECTED#v}"  # strip leading v
          BINARY="br"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            BINARY="br.exe"
          fi
          RAW=$(./target/${{ matrix.target }}/release/${BINARY} --version 2>&1)
          # clap outputs "br X.Y.Z"; extract the version token
          ACTUAL=$(echo "$RAW" | awk '{print $NF}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: Binary reports version '$ACTUAL' (from '$RAW') but expected '$EXPECTED'"
            exit 1
          fi
          echo "Version check passed: $ACTUAL == $EXPECTED"

      - name: Record cross-build verification strategy
        if: ${{ !matrix.can_run }}
        run: |
          echo "Cross-built target ${{ matrix.target }} cannot be executed on ${{ runner.os }}."
          echo "Relying on tag/Cargo.toml preflight and successful link output instead."

      - name: Determine release asset version
        id: asset_version
        run: |
          ASSET_VERSION="${GITHUB_REF_NAME#v}"
          echo "asset_version=$ASSET_VERSION" >> "$GITHUB_OUTPUT"
          echo "Release asset version: $ASSET_VERSION"

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.tar.gz br
          cd ../../..

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          zip -j ../../../br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.zip br.exe
          cd ../../..

      - name: Install minisign (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -sL https://github.com/jedisct1/minisign/releases/download/0.11/minisign-0.11-linux.tar.gz | tar xz
          # Use architecture-appropriate binary (x86_64 or aarch64)
          ARCH=$(uname -m)
          if [[ "$ARCH" == "aarch64" ]] || [[ "$ARCH" == "arm64" ]]; then
            sudo mv minisign-linux/aarch64/minisign /usr/local/bin/
          else
            sudo mv minisign-linux/x86_64/minisign /usr/local/bin/
          fi

      - name: Generate checksum (Linux)
        if: runner.os == 'Linux'
        run: |
          sha256sum br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }} > br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }}.sha256

      - name: Install minisign (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install minisign

      - name: Generate checksum (macOS)
        if: runner.os == 'macOS'
        run: |
          shasum -a 256 br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }} > br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }}.sha256

      - name: Verify checksum (Linux)
        if: runner.os == 'Linux'
        run: sha256sum -c br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }}.sha256

      - name: Verify checksum (macOS)
        if: runner.os == 'macOS'
        run: shasum -a 256 -c br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }}.sha256

      - name: Sign archive with Ed25519 (Linux/macOS)
        if: runner.os != 'Windows' && env.MINISIGN_SECRET_KEY != ''
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          signing_key="$(mktemp "${RUNNER_TEMP:-${TMPDIR:-/tmp}}/minisign-key.XXXXXX")"
          trap 'rm -f "$signing_key"' EXIT
          chmod 600 "$signing_key"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$signing_key"
          minisign -Sm br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }} -s "$signing_key" -t "br ${{ github.ref_name }} ${{ matrix.name }}"

      - name: Upload artifacts
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: br-${{ matrix.name }}
          path: |
            br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }}
            br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }}.sha256
            br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }}.minisig
          retention-days: 7

      - name: Upload artifacts (act)
        if: ${{ env.ACT == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: br-${{ matrix.name }}
          path: |
            br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }}
            br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }}.sha256
            br-${{ steps.asset_version.outputs.asset_version }}-${{ matrix.name }}.${{ matrix.archive }}.minisig
          retention-days: 7

  create-release:
    name: Create Release
    needs: build-release
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine release asset version
        id: asset_version
        run: |
          ASSET_VERSION="${GITHUB_REF_NAME#v}"
          echo "asset_version=$ASSET_VERSION" >> "$GITHUB_OUTPUT"
          echo "Release asset version: $ASSET_VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Validate required artifacts present
        run: |
          ASSET_VERSION="${GITHUB_REF_NAME:-v9.9.9}"
          ASSET_VERSION="${ASSET_VERSION#v}"
          MISSING=()
          for platform in linux_amd64 linux_musl_amd64 linux_arm64 linux_musl_arm64 darwin_amd64 darwin_arm64 windows_amd64; do
            if ! compgen -G "artifacts/br-${ASSET_VERSION}-${platform}.*" > /dev/null; then
              MISSING+=("$platform")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required platform artifacts: ${MISSING[*]}"
            echo "Release cannot proceed without all required platforms."
            echo "Missing: ${MISSING[*]}"
            exit 1
          fi
          echo "All required platform artifacts present."

      - name: Generate combined checksums
        run: |
          cd artifacts
          combined_checksums="$(mktemp)"
          find . -maxdepth 1 -type f -name '*.sha256' ! -name checksums.sha256 -print0 \
            | sort -z \
            | xargs -0 cat > "$combined_checksums"
          mv "$combined_checksums" checksums.sha256
          echo "=== Combined checksums ==="
          cat checksums.sha256

      - name: Verify all checksums
        run: |
          cd artifacts
          echo "=== Verifying all checksums ==="
          while IFS= read -r -d '' checksum_file; do
            if [ "$checksum_file" != "./checksums.sha256" ]; then
              echo "Verifying $checksum_file..."
              sha256sum -c "$checksum_file"
            fi
          done < <(find . -maxdepth 1 -type f -name '*.sha256' -print0 | sort -z)

      - name: Generate changelog
        id: changelog
        env:
          RELIABILITY_OVERRIDE_REASON: ${{ inputs.reliability_override_reason }}
          SKIP_RELIABILITY_GATES: ${{ inputs.skip_reliability_gates }}
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to ${{ github.ref_name }}"
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
            PREV_TAG_DATE=$(git log -1 --format=%ci "$PREV_TAG" 2>/dev/null | cut -d' ' -f1 || echo "")
          else
            echo "No previous tag found, generating changelog from start"
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD~20..HEAD 2>/dev/null || git log --pretty=format:"- %s (%h)")
            PREV_TAG_DATE=""
          fi

          # Extract closed beads from JSONL since last release
          BEADS_SECTION=""
          if [ -f ".beads/issues.jsonl" ]; then
            echo "Extracting closed beads from issues.jsonl..."
            # Filter beads closed after the previous tag date
            if [ -n "$PREV_TAG_DATE" ]; then
              CLOSED_BEADS=$(cat .beads/issues.jsonl | jq -r --arg date "$PREV_TAG_DATE" \
                'select(.status == "closed" and (.closed_at // .updated_at) > $date) | "- \(.id): \(.title)"' 2>/dev/null | head -50 || echo "")
            else
              CLOSED_BEADS=$(cat .beads/issues.jsonl | jq -r \
                'select(.status == "closed") | "- \(.id): \(.title)"' 2>/dev/null | tail -20 || echo "")
            fi
            if [ -n "$CLOSED_BEADS" ]; then
              BEADS_SECTION="### Closed Beads

          $CLOSED_BEADS

          "
            fi
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$SKIP_RELIABILITY_GATES" = "true" ]; then
            RELIABILITY_SECTION="## Release Verification

          Reliability gates were explicitly skipped for this manual release.

          Reason: $RELIABILITY_OVERRIDE_REASON

          "
          else
            RELIABILITY_SECTION="## Release Verification

          Release reliability gates completed before artifacts were built:
          failure-corpus replay, crash-injection sync matrix, long-lived single-workspace stress,
          concurrent command-family integrity stress, and doctor/recovery postcondition checks.

          "
          fi

          # Create release notes file
          {
            cat << EOF
          ## What's Changed

          ${BEADS_SECTION}### Commits

          EOF
            echo "$COMMITS"
            cat << EOF

          ${RELIABILITY_SECTION}
          EOF
            cat << 'EOF'
          ## Platforms

          | Platform | Architecture | File |
          |----------|--------------|------|
          | Linux | x86_64 (gnu) | `br-${{ steps.asset_version.outputs.asset_version }}-linux_amd64.tar.gz` |
          | Linux | x86_64 (musl, static) | `br-${{ steps.asset_version.outputs.asset_version }}-linux_musl_amd64.tar.gz` |
          | Linux | ARM64 (gnu) | `br-${{ steps.asset_version.outputs.asset_version }}-linux_arm64.tar.gz` |
          | Linux | ARM64 (musl, static) | `br-${{ steps.asset_version.outputs.asset_version }}-linux_musl_arm64.tar.gz` |
          | macOS | x86_64 (Intel) | `br-${{ steps.asset_version.outputs.asset_version }}-darwin_amd64.tar.gz` |
          | macOS | ARM64 (Apple Silicon) | `br-${{ steps.asset_version.outputs.asset_version }}-darwin_arm64.tar.gz` |
          | Windows | x86_64 | `br-${{ steps.asset_version.outputs.asset_version }}-windows_amd64.zip` |

          ## Installation

          ### Quick Install (Recommended)

          ```bash
          curl -fsSL https://raw.githubusercontent.com/Dicklesworthstone/beads_rust/main/install.sh | bash
          ```

          ### Cargo Install

          ```bash
          cargo install --git https://github.com/Dicklesworthstone/beads_rust.git --tag ${{ github.ref_name }}
          ```

          ### Manual Download

          Download the appropriate binary for your platform from the assets below.

          **Verify checksum:**

          ```bash
          # Download checksums.sha256 and your binary
          sha256sum -c checksums.sha256 --ignore-missing
          ```

          **Verify signature (optional):**

          Binaries are signed with Ed25519 using minisign. Install minisign and verify:

          ```bash
          # Download the .minisig file for your binary
          # Public key: RWSp4vEOdKsY8e95W9/4eLrSJ2B2GHv4U+CKMBXqRX3JhPrPn8J0DWBG
          minisign -Vm br-${{ steps.asset_version.outputs.asset_version }}-*.tar.gz -P RWSp4vEOdKsY8e95W9/4eLrSJ2B2GHv4U+CKMBXqRX3JhPrPn8J0DWBG
          ```

          ## Full Changelog

          See [CHANGELOG.md](https://github.com/Dicklesworthstone/beads_rust/blob/main/CHANGELOG.md) for the complete history.
          EOF
          } > RELEASE_NOTES.md

          echo "=== Generated release notes ==="
          cat RELEASE_NOTES.md

      - name: Generate SBOM (CycloneDX)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft dir:. -o cyclonedx-json > artifacts/sbom.cdx.json
          syft dir:. -o spdx-json > artifacts/sbom.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v2
        with:
          name: br ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/br-${{ steps.asset_version.outputs.asset_version }}-*.tar.gz
            artifacts/br-${{ steps.asset_version.outputs.asset_version }}-*.zip
            artifacts/br-${{ steps.asset_version.outputs.asset_version }}-*.sha256
            artifacts/br-${{ steps.asset_version.outputs.asset_version }}-*.minisig
            artifacts/checksums.sha256
            artifacts/sbom.cdx.json
            artifacts/sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SLSA provenance attestations
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v2
        with:
          subject-path: |
            artifacts/br-${{ steps.asset_version.outputs.asset_version }}-*.tar.gz
            artifacts/br-${{ steps.asset_version.outputs.asset_version }}-*.zip

  update-crates-io:
    name: Publish to crates.io
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: "!contains(github.ref_name, '-')"  # Skip pre-releases
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - name: Publish to crates.io
        # `--locked` pins resolution to Cargo.lock; without it, a nightly-only
        # transitive dep bump can silently modify Cargo.lock when cargo fetch
        # runs during `cargo publish`, and the publish then refuses with
        # "files in the working directory contain changes that were not yet
        # committed into git" (seen on v0.1.43).  `--no-verify` skips the
        # rebuild-and-test pass that CI already ran, keeping the publish
        # under the 15-minute timeout and avoiding a second resolution.
        run: cargo publish --locked --no-verify --token ${{ secrets.CRATES_IO_TOKEN }}
